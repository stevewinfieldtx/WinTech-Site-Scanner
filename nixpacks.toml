# Railway/Nixpacks build config.
# Adds the system libraries headless Chromium needs for the optional rendered-view pass.
# The render pass only runs when ENABLE_RENDER=true; with it off, these libs are simply unused.

[phases.setup]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2",
  "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1",
  "libpango-1.0-0", "libcairo2", "libasound2", "libatspi2.0-0", "libgtk-3-0", "libx11-xcb1",
  "fonts-liberation", "ca-certificates"
]

# Install Chromium into a project-relative cache so the build and runtime agree on its location
# (avoids the common "Could not find Chromium" error on Nixpacks platforms). If you prefer, set the
# same value as a Railway service variable instead.
[variables]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
